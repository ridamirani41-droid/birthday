<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make A Wish 🎂</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#ffdbe8,#fff7fa);

overflow:hidden;

}

.card{

background:white;

width:500px;

padding:40px;

border-radius:25px;

text-align:center;

box-shadow:0 15px 30px rgba(0,0,0,.15);

}

h1{

color:#ff4d7d;

margin-bottom:20px;

}

p{

color:#666;

margin-bottom:25px;

font-size:18px;

}

#cake{

width:220px;

cursor:pointer;

transition:.4s;

}

#cake:hover{

transform:scale(1.05);

}

#message{

display:none;

margin-top:25px;

font-size:22px;

color:#ff4d7d;

font-weight:bold;

}

#next{

display:none;

margin-top:25px;

padding:14px 28px;

border:none;

background:#ff4d7d;

color:white;

border-radius:12px;

font-size:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1>🎂 Make A Wish, Umair 🎂</h1>

<p>Click on the cake and make your birthday wish ✨</p>

<img
id="cake"
src="images/cake.png.png"
alt="Cake">

<div id="message">

🎉 Happy Birthday Umair ❤️

<br><br>

May Allah bless you with happiness, success and endless smiles. 🤍

</div>

<button
id="next"
onclick="location.href='final.html'">

Final Surprise ❤️

</button>

</div>

<script>

document.getElementById("cake").onclick=function(){

this.style.transform="scale(.9)";
this.style.opacity=".8";

document.getElementById("message").style.display="block";

document.getElementById("next").style.display="inline-block";

}

</script>

</body>
</html>
