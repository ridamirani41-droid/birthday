<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Best Friend Award</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ffd6e7,#fff0f6);
}

.certificate{
width:800px;
max-width:90%;
background:white;
padding:40px;
border:10px solid #ff4d7d;
border-radius:25px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.2);
animation:zoom 1s;
}

@keyframes zoom{
from{
transform:scale(.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

h1{
font-size:45px;
color:#ff2d75;
margin-bottom:20px;
}

h2{
font-size:32px;
color:#444;
margin:20px 0;
}

.name{
font-size:55px;
color:#ff1493;
font-weight:bold;
margin:20px 0;
text-shadow:2px 2px 8px pink;
}

p{
font-size:22px;
color:#555;
line-height:1.8;
}

.medal{
font-size:90px;
margin-bottom:20px;
}

button{
margin-top:35px;
padding:15px 35px;
border:none;
background:#ff4d7d;
color:white;
font-size:20px;
border-radius:35px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff1f66;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="certificate">

<div class="medal">🏆</div>

<h1>Certificate of Appreciation</h1>

<p>This certificate is proudly presented to</p>

<div class="name">UMAIR ❤️</div>

<h2>World's Best Best Friend</h2>

<p>
For always being caring, supportive, kind,<br>
and making every moment more beautiful.<br><br>

You officially hold the title of<br>

<b>🥇 World's Best Best Friend 🥇</b>
</p>

<button onclick="location.href='video.html'">
🎥 Watch Your Special Surprise
</button>

</div>

</body>
</html>
