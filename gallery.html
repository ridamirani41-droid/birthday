<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#fff5f9);
padding:40px;
text-align:center;
}

h1{
color:#ff4d7d;
margin-bottom:10px;
font-size:38px;
}

h3{
color:#666;
margin-bottom:40px;
font-weight:normal;
}

.gallery{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;

}

.photo{

background:white;
padding:15px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
transition:.4s;
cursor:pointer;

}

.photo:hover{

transform:rotate(-3deg) scale(1.05);

}

.photo img{

width:100%;
height:250px;
object-fit:cover;
border-radius:10px;

}

.caption{

margin-top:12px;
font-size:18px;
color:#555;

}

button{

margin-top:40px;
padding:15px 30px;
border:none;
background:#ff4d7d;
color:white;
font-size:18px;
border-radius:12px;
cursor:pointer;

}

button:hover{

background:#ff2d68;

}

</style>

</head>

<body>

<h1>Moments I Cherish With You ❤️</h1>

<h3>Every picture holds a beautiful memory...</h3>

<div class="gallery">

<div class="photo">
<img src="images/photo1.jpg">
<div class="caption">Memory 1 🌸</div>
</div>

<div class="photo">
<img src="images/photo2.jpg">
<div class="caption">Memory 2 💖</div>
</div>

<div class="photo">
<img src="images/photo3.jpg">
<div class="caption">Memory 3 ✨</div>
</div>

<div class="photo">
<img src="images/photo4.jpg">
<div class="caption">Memory 4 🤍</div>
</div>

<div class="photo">
<img src="images/photo5.jpg">
<div class="caption">Memory 5 🎀</div>
</div>

<div class="photo">
<img src="images/photo6.jpg">
<div class="caption">Memory 6 🌷</div>
</div>

</div>

<button onclick="location.href='cake.html'">
Next Surprise 🎂
</button>

</body>
</html>
